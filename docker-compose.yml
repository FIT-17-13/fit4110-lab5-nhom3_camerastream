services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-lab05
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - team-internal
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s

  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: lab05
      POSTGRES_PASSWORD: lab05pass
      POSTGRES_DB: iotdb
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab05"]
      interval: 10s

  ai-service:
    build:
      context: ./src/ai_service
      dockerfile: Dockerfile
    container_name: fit4110-ai-lab05
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 10s

networks:
  team-internal:
    driver: bridge